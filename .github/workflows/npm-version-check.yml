name: npm version check

on:
  schedule:
    # Run daily at 09:00 UTC (18:00 JST)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🔍 Compare git tag vs npm version
        id: compare
        run: |
          # Why: v3 beta releases ship as native GitHub Release assets, while npm only tracks
          # stable TypeScript-era releases that still use the uloop-cli package.
          GIT_VERSION=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
          if [ -z "${GIT_VERSION}" ]; then
            echo "⚠️ No stable git tags found matching 'vX.Y.Z', skipping check"
            echo "mismatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Retry up to 3 times to avoid false positives from transient network errors
          NPM_VERSION=""
          for i in 1 2 3; do
            if NPM_VERSION=$(npm view uloop-cli version 2>/dev/null); then
              break
            fi
            echo "⚠️ npm view attempt ${i} failed, retrying in 10s..."
            sleep 10
          done

          if [ -z "${NPM_VERSION}" ]; then
            echo "❌ npm view failed after 3 attempts — aborting to avoid false positive"
            exit 1
          fi

          echo "git_version=${GIT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_version=${NPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "📋 Git tag: v${GIT_VERSION}"
          echo "📋 npm: ${NPM_VERSION}"

          if [ "${GIT_VERSION}" = "${NPM_VERSION}" ]; then
            echo "✅ Versions match"
            echo "mismatch=false" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Version mismatch detected"
            echo "mismatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Check for existing issue
        if: steps.compare.outputs.mismatch == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list --label "npm-publish-failed" --state open --json number --jq '.[0].number // empty')
          if [ -n "${ISSUE}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Open issue #${ISSUE} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚨 Create issue
        if: steps.compare.outputs.mismatch == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_VERSION: ${{ steps.compare.outputs.git_version }}
          NPM_VERSION: ${{ steps.compare.outputs.npm_version }}
        run: |
          gh label create "npm-publish-failed" --color "d73a4a" --description "npm publish failed for a release" --force
          gh issue create \
            --title "npm publish failed: v${GIT_VERSION} not on npm" \
            --label "npm-publish-failed" \
            --body "## npm version mismatch detected

          | Source | Version |
          |--------|---------|
          | Git tag | v${GIT_VERSION} |
          | npm | ${NPM_VERSION} |

          ### How to fix

          Run the [manual-npm-publish](https://github.com/${{ github.repository }}/actions/workflows/npm-publish.yml) workflow with ref \`v${GIT_VERSION}\`.

          This issue was created automatically by the [npm version check](https://github.com/${{ github.repository }}/actions/workflows/npm-version-check.yml) workflow."
